<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Matriz SWOT</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f7fb;
    color: #222;
  }

  header {
    text-align: center;
    padding: 15px;
    background: white;
    border-bottom: 1px solid #ddd;
  }

  h1 {
    margin: 0;
    font-size: 22px;
  }

  .botoes {
    text-align: center;
    padding: 10px;
  }

  button {
    margin: 5px;
    padding: 8px 14px;
    border: 1px solid #ccc;
    background: white;
    cursor: pointer;
    border-radius: 6px;
    font-weight: bold;
  }

  button:hover {
    background: #eee;
  }

  .canvas {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    grid-template-rows: repeat(2, 300px);
    gap: 10px;
    padding: 10px;
  }

  .caixa {
    background: white;
    border: 1px solid #ccc;
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .titulo {
    background: #e9eef7;
    font-size: 13px;
    text-align: center;
    padding: 6px;
    font-weight: bold;
  }

  textarea {
    flex: 1;
    border: none;
    resize: none;
    padding: 10px;
    font-size: 13px;
    outline: none;
  }

  /* SWAT layout */
  .forcas { grid-column: 1; grid-row: 1; }
  .fraquezas { grid-column: 2; grid-row: 1; }
  .oportunidades { grid-column: 1; grid-row: 2; }
  .ameacas { grid-column: 2; grid-row: 2; }

  @page {
    size: A4 landscape;
    margin: 5mm;
  }

  @media print {
    body {
      margin: 0;
      background: white;
    }

    header,
    .botoes {
      display: none !important;
    }

    .canvas {
      height: 190mm;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      grid-template-rows: repeat(2, 1fr);
      gap: 3mm;
    }

    .caixa {
      height: 100%;
      break-inside: avoid;
      page-break-inside: avoid;
    }

    .titulo {
      font-size: 10px;
      padding: 4px;
    }

    textarea {
      font-size: 10px;
      padding: 6px;
    }
  }
</style>
</head>

<body>

<header>
  <h1>Matriz SWOT</h1>
</header>

<div class="botoes">
  <button onclick="salvar()">Salvar</button>
  <button onclick="limpar()">Limpar</button>
  <button onclick="exportar()">Exportar TXT</button>
</div>

<div class="canvas">

  <div class="caixa forcas">
    <div class="titulo">Forças (Strengths)</div>
    <textarea id="forcas"></textarea>
  </div>

  <div class="caixa fraquezas">
    <div class="titulo">Fraquezas (Weaknesses)</div>
    <textarea id="fraquezas"></textarea>
  </div>

  <div class="caixa oportunidades">
    <div class="titulo">Oportunidades (Opportunities)</div>
    <textarea id="oportunidades"></textarea>
  </div>

  <div class="caixa ameacas">
    <div class="titulo">Ameaças (Threats)</div>
    <textarea id="ameacas"></textarea>
  </div>

</div>

<script>

const campos = [
  "forcas",
  "fraquezas",
  "oportunidades",
  "ameacas"
];

// auto-save
function iniciarAutoSave() {
  campos.forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;

    const salvo = localStorage.getItem(id);
    if (salvo !== null) el.value = salvo;

    el.addEventListener("input", () => {
      localStorage.setItem(id, el.value);
    });
  });
}

// salvar manual
function salvar() {
  campos.forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    localStorage.setItem(id, el.value);
  });
  alert("Salvo com sucesso!");
}

// limpar tudo
function limpar() {
  if (!confirm("Deseja realmente limpar tudo?")) return;

  campos.forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.value = "";
    localStorage.removeItem(id);
  });
}

// exportar TXT
function exportar() {
  let texto = "MATRIZ SWOT\n\n";

  campos.forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;

    texto += id.toUpperCase() + ":\n" + el.value + "\n\n";
  });

  const blob = new Blob([texto], { type: "text/plain" });
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "swot.txt";
  link.click();
}

document.addEventListener("DOMContentLoaded", iniciarAutoSave);

</script>

</body>
</html>
